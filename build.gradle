plugins {
    id 'java'
    id 'eclipse'
    id 'application'
    id 'org.triton4j.codegen'
}


group 'io.dscope'
version '0.1.0'
def cliMainClass = 'org.triton4j.cli.TritonParserCli'

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

application {
    mainClass = cliMainClass
    applicationDefaultJvmArgs = ['--add-modules', 'jdk.incubator.code']
}

def internalCompilerExports = [
    '--add-modules', 'jdk.incubator.code',
    '--add-exports', 'jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
    '--add-exports', 'jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
    '--add-exports', 'jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED',
    '--add-exports', 'jdk.compiler/com.sun.tools.javac.jvm=ALL-UNNAMED',
    '--add-exports', 'jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED',
    '--add-exports', 'jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED',
    '--add-exports', 'jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED',
    '--add-exports', 'jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
    '--add-exports', 'jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED',
    '--add-exports', 'java.base/jdk.internal.access=ALL-UNNAMED',
    '--add-exports', 'java.base/jdk.internal.classfile.impl=ALL-UNNAMED'
]

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.addAll(internalCompilerExports)
}

repositories {
    mavenLocal()
    mavenCentral()
}


jar {
    manifest {
        attributes('Implementation-Title': 'dscope-triton',
                   'Implementation-Version': project.version,
                   'Main-Class': cliMainClass)
    }
    
    archiveBaseName = 'dscope-triton'
}

task fatJar(type: Jar) {
    manifest {
        attributes('Implementation-Title': 'dscope-triton',
                   'Implementation-Version': project.version,
                   'Main-Class': cliMainClass)
    }
    
    archiveBaseName = 'dscope-triton-with-dependencies'
    
    from { configurations.compileClasspath.collect { it.isDirectory() ? it : zipTree(it) } }
    with jar
}

test {
    useJUnitPlatform()
    jvmArgs '--add-modules', 'jdk.incubator.code'
}

tritonCodegen {
    inputs.from(layout.projectDirectory.dir('tutorials_python'))
    outputDir.set(layout.buildDirectory.dir('generated-triton-java'))
    packageName.set('org.triton4j.triton.test')
    language.set('tl')
    continueOnError.set(true)
    verbose.set(false)
}

def resolveExecutableOnPath = { String executable ->
    def envPath = System.getenv("PATH") ?: ""
    for (String entry : envPath.split(java.util.regex.Pattern.quote(File.pathSeparator))) {
        if (!entry)
            continue
        File candidate = new File(entry, executable)
        if (candidate.isFile() && candidate.canExecute())
            return candidate
    }
    return null
}

def isMacOs = (System.getProperty("os.name") ?: "").toLowerCase(java.util.Locale.ROOT).contains("mac")

tasks.register('checkMetalEnv') {
    group = 'verification'
    description = 'Validate Metal toolchain availability and Babylon JDK module requirements (macOS only).'
    doLast {
        if (!isMacOs) {
            logger.lifecycle("Skipping checkMetalEnv: current OS is not macOS.")
            return
        }

        String metalTcBin = System.getenv('METAL_TC_BIN')
        if (metalTcBin == null || metalTcBin.trim().isEmpty()) {
            throw new GradleException("METAL_TC_BIN is not set. Example: export METAL_TC_BIN=/path/to/Metal.xctoolchain/usr/bin")
        }

        File metalDir = file(metalTcBin)
        if (!metalDir.isDirectory()) {
            throw new GradleException("METAL_TC_BIN does not point to an existing directory: ${metalDir}")
        }

        File metalBinary = new File(metalDir, 'metal')
        File metallibBinary = new File(metalDir, 'metallib')

        if (!metalBinary.isFile() || !metalBinary.canExecute()) {
            throw new GradleException("Missing executable '${metalBinary}'.")
        }
        if (!metallibBinary.isFile() || !metallibBinary.canExecute()) {
            throw new GradleException("Missing executable '${metallibBinary}'.")
        }

        File metalOnPath = resolveExecutableOnPath('metal')
        File metallibOnPath = resolveExecutableOnPath('metallib')
        if (metalOnPath == null || metallibOnPath == null) {
            logger.warn("PATH does not currently resolve metal/metallib in the Gradle daemon environment.")
            logger.warn("Using METAL_TC_BIN directly: {}", metalDir.absolutePath)
        }

        File javaBin = new File(System.getProperty("java.home"), "bin/java")
        if (!javaBin.isFile()) {
            throw new GradleException("Cannot locate java binary for current Gradle runtime: ${javaBin}")
        }

        Process process = new ProcessBuilder(javaBin.absolutePath, "--list-modules")
                .redirectErrorStream(true)
                .start()
        String modulesOutput = process.inputStream.getText("UTF-8")
        int exitCode = process.waitFor()
        if (exitCode != 0) {
            throw new GradleException("Failed to query JDK modules with ${javaBin} (exit ${exitCode}).")
        }
        if (!modulesOutput.readLines().any { it.startsWith("jdk.incubator.code@") }) {
            throw new GradleException("Current JDK does not provide jdk.incubator.code. Use Babylon JDK for this project.")
        }

        logger.lifecycle("Metal environment OK")
        logger.lifecycle("METAL_TC_BIN: {}", metalDir.absolutePath)
        logger.lifecycle("metal (METAL_TC_BIN): {}", metalBinary.absolutePath)
        logger.lifecycle("metallib (METAL_TC_BIN): {}", metallibBinary.absolutePath)
        logger.lifecycle("metal (PATH): {}", metalOnPath == null ? "<not resolved>" : metalOnPath.absolutePath)
        logger.lifecycle("metallib (PATH): {}", metallibOnPath == null ? "<not resolved>" : metallibOnPath.absolutePath)
        logger.lifecycle("java: {}", javaBin.absolutePath)
    }
}

tasks.register('metalBuild') {
    group = 'build'
    description = 'Run build, with Metal environment checks on macOS only.'
    if (isMacOs) {
        dependsOn(tasks.named('checkMetalEnv'))
    } else {
        logger.lifecycle("Configuring metalBuild without checkMetalEnv because OS is not macOS.")
    }
    dependsOn(tasks.named('build'))
}

tasks.register('runTurboQuantSample', JavaExec) {
    group = 'application'
    description = 'Run the TurboQuant Java and Triton4j sample.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.triton4j.samples.turboquant.TurboQuantSample'
    jvmArgs '--add-modules', 'jdk.incubator.code'
}

tasks.register('benchmarkTurboQuant', JavaExec) {
    group = 'application'
    description = 'Run the TurboQuant benchmark and export a JSON report.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.triton4j.samples.turboquant.TurboQuantBenchmarkCli'
    jvmArgs '--add-modules', 'jdk.incubator.code'
    doFirst {
        def argPairs = [
            ['turboQuantHeadDim', '--head-dim'],
            ['turboQuantSeqLen', '--seq-len'],
            ['turboQuantBits', '--bits'],
            ['turboQuantWarmupRuns', '--warmup-runs'],
            ['turboQuantMeasuredRuns', '--measured-runs'],
            ['turboQuantSeed', '--seed']
        ]
        args = []
        argPairs.each { pair ->
            if (project.hasProperty(pair[0])) {
                args pair[1], project.property(pair[0]).toString()
            }
        }
    }
}

dependencies {	
	implementation group: 'info.picocli', name: 'picocli', version: '4.7.7'
	
	// https://mvnrepository.com/artifact/org.slf4j/slf4j-api
	compileOnly group: 'org.slf4j', name: 'slf4j-api', version: '2.0.17'	
	
	// https://mvnrepository.com/artifact/com.palantir.javapoet/javapoet
	implementation group: 'com.palantir.javapoet', name: 'javapoet', version: '0.11.0'

	implementation group: 'oracle.code', name: 'triton', version: '1.0-SNAPSHOT'
	
	// https://mvnrepository.com/artifact/org.junit.jupiter/junit-jupiter-api
	testImplementation group: 'org.junit.jupiter', name: 'junit-jupiter-api', version: '5.14.2'
	
	// https://mvnrepository.com/artifact/org.junit.jupiter/junit-jupiter-engine
	testImplementation group: 'org.junit.jupiter', name: 'junit-jupiter-engine', version: '5.14.2'

	testRuntimeOnly group: 'org.junit.platform', name: 'junit-platform-launcher', version: '1.14.2'

	testImplementation group: 'org.graalvm.polyglot', name: 'polyglot', version: '25.0.2'
	testImplementation group: 'org.graalvm.python', name: 'python-embedding', version: '25.0.2'

	testImplementation group: 'oracle.code', name: 'hat-core', version: '1.0'
	testRuntimeOnly group: 'oracle.code', name: 'hat-backend-java-seq', version: '1.0'
	testRuntimeOnly group: 'oracle.code', name: 'hat-backend-java-mt', version: '1.0'
			
	// https://mvnrepository.com/artifact/org.slf4j/slf4j-simple
	testImplementation group: 'org.slf4j', name: 'slf4j-simple', version: '2.0.17'		
	
}
